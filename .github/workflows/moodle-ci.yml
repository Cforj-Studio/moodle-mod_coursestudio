name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2']
        moodle-branch: ['MOODLE_401_STABLE', 'MOODLE_403_STABLE', 'MOODLE_404_STABLE']
        database: ['pgsql']

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, zip, gd, soap
          coverage: none

      - name: Deploy moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo $(cd ci && pwd)/vendor/bin >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP CodeSniffer
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci codechecker --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Pre-build AMD files
        if: ${{ !cancelled() }}
        run: |
          echo "=== Grunt binary check ==="
          ls -la moodle/node_modules/grunt-cli/bin/grunt.js 2>&1 || echo "grunt-cli NOT FOUND"
          ls -la moodle/node_modules/.bin/grunt 2>&1 || echo ".bin/grunt NOT FOUND"
          echo "=== Plugin directory ==="
          ls -la moodle/mod/coursestudio 2>&1
          echo "=== AMD files before ==="
          head -c 120 moodle/mod/coursestudio/amd/build/player.min.js 2>&1 || echo "FILE NOT FOUND"
          echo ""
          echo "=== Running grunt pre-build ==="
          cd moodle
          # Install npm packages if needed
          [ -f node_modules/grunt-cli/bin/grunt.js ] || npm install 2>&1 | tail -5
          # Run grunt exactly as moodle-plugin-ci does
          node node_modules/grunt-cli/bin/grunt.js amd --root=mod/coursestudio 2>&1 || echo "(grunt exited non-zero - expected when files were stale)"
          echo "=== AMD files after grunt ==="
          head -c 120 mod/coursestudio/amd/build/player.min.js 2>&1 || echo "FILE NOT FOUND"
          echo ""
          echo "=== Committing built files to plugin git ==="
          cd ${{ github.workspace }}/plugin
          git config user.email "ci@ci.invalid"
          git config user.name "CI Build"
          git add amd/build/player.min.js amd/build/player.min.js.map
          git status --short amd/build/
          git diff --cached --quiet && echo "Nothing to commit (files unchanged)" || git commit -m "ci: update AMD build"

      - name: Grunt (AMD build)
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: Upload AMD build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: amd-build-${{ matrix.php }}-${{ matrix.moodle-branch }}
          path: |
            moodle/mod/coursestudio/amd/build/
            plugin/amd/build/
          if-no-files-found: warn

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning
